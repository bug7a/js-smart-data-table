<!DOCTYPE html>
<html lang="en">

<head>
    <title>Smart Table - Edit & Delete Sample</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- LIBRARY FILES -->
    <link rel="stylesheet" type="text/css" href="../basic/basic.min.css">
    <script src="../basic/basic.js" type="text/javascript" charset="utf-8"></script>
    <script src="../basic/scroll-bar.js" type="text/javascript" charset="utf-8"></script>

    <!-- COMPONENT FILES -->
    <script src="../comp-m2/search-input-v2.js" type="text/javascript" charset="utf-8"></script>
    <script src="../comp-m2/tooltip.js" type="text/javascript" charset="utf-8"></script>
    <script src="../comp-m2/input-b.js" type="text/javascript" charset="utf-8"></script>
    <script src="../comp-m2/email-input-b.js" type="text/javascript" charset="utf-8"></script>
    <script src="../comp-m2/number-input-b.js" type="text/javascript" charset="utf-8"></script>
    <script src="../comp-m3/hold-to-confirm-button.js" type="text/javascript" charset="utf-8"></script>
    <script src="../comp-m3/smart-table.js" type="text/javascript" charset="utf-8"></script>

    <script>

        let titleDataList = [
            { name: "ID", dataTitle: "id", dataType: "integer", width: 100, shortable: 1 },
            { name: "NAME", dataTitle: "name", dataType: "string", width: 180, shortable: 1 },
            { name: "EMAIL", dataTitle: "email", dataType: "string", width: 290, shortable: 0 },
            { name: "", dataTitle: "active", dataType: "boolean", width: 80, shortable: 0 },
        ];

        let itemDataList = [
            { id: 1, name: "Bugra Ozden", desc: "Developer", email: "bugra.ozden@gmail.com", active: 1 },
            { id: 2, name: "Alper Kaya", desc: "Product Manager", email: "a.kaya@company.net", active: 1 },
            { id: 3, name: "Murat Demir", desc: "Backend Engineer", email: "mdemir@work.io", active: 0 },
            { id: 4, name: "Deniz Arslan", desc: "UI/UX Designer", email: "deniz_arslan@studio.com", active: 1 },
            { id: 5, name: "Nilüfer Çelik", desc: "Data Analyst", email: "n.celik@datahouse.org", active: 1 },
            { id: 6, name: "Frank Weber", desc: "DevOps Engineer", email: "frank.weber@infrateam.de", active: 0 },
            { id: 7, name: "Dany Moreau", desc: "Mobile Developer", email: "dmoreau@appworks.fr", active: 0 },
            { id: 8, name: "Duygu Şahin", desc: "QA Engineer", email: "duygu.sahin@testlab.com", active: 0 },
            { id: 9, name: "Filiz Yıldız", desc: "Scrum Master", email: "f.yildiz@agile.io", active: 1 },
            { id: 10, name: "Anka Polat", desc: "System Architect", email: "anka_polat@systems.net", active: 1 },
            { id: 11, name: "Ceren Aktaş", desc: "Frontend Developer", email: "ceren.aktas@webco.com", active: 1 },
            { id: 12, name: "Emre Güneş", desc: "Database Administrator", email: "e.gunes@dbworks.org", active: 0 },
            { id: 13, name: "Selin Koç", desc: "Business Analyst", email: "selin.koc@analytics.io", active: 1 },
            { id: 14, name: "Tarık Yılmaz", desc: "Cloud Engineer", email: "tarik.yilmaz@cloudbase.co", active: 1 },
            { id: 15, name: "Yasemin Doğan", desc: "Technical Writer", email: "y.dogan@docshub.net", active: 0 },
            { id: 16, name: "Kemal Aydın", desc: "Security Specialist", email: "kemal_aydin@securelab.com", active: 1 },
            { id: 17, name: "Pınar Erdoğan", desc: "HR Manager", email: "p.erdogan@people.io", active: 0 },
            { id: 18, name: "Baran Çetin", desc: "Full Stack Developer", email: "baran.cetin@devstack.net", active: 1 },
            { id: 19, name: "Zeynep Karaca", desc: "Marketing Specialist", email: "zkaraca@brandworks.com", active: 1 },
            { id: 20, name: "Hakan Bulut", desc: "Network Engineer", email: "h.bulut@netcore.org", active: 0 },
        ];

        let newId = null;
        let selectedId = null;
        let smartTable1 = null;
        let inputId, inputName, inputEmail, inputActive, lblStatus;
        let btnEdit, btnDelete, btnClean;

        window.onload = function () {

            page.color = "whitesmoke";
            newId = findNextAvailableID();

            // LEFT: Form Panel
            VGroup({
                width: "40%",
                gap: 8,
                padding: [0, 16],
                align: "top left",
            });

            initTitle();
            initEditForm();
            initStatusLabel();
            initFormButtons();

            endGroup();

            // RIGHT: Smart Data Table
            smartTable1 = SmartTable({
                top: 0,
                titleDataList: titleDataList,
                itemDataList: itemDataList,
                onSelect: function (data) {

                    console.log(data);
                    fillForm(data);

                },
                style: { width: "60%", height: "100%" },
            });
            smartTable1.right = smartTable1.getVerticalScrollWidth() + 2;

        };

        const initTitle = function () {

            // Title
            Label({
                text: "Record Details",
                fontSize: 24,
                padding: [20, 6],
                textColor: "#65A293",
            });
            that.elem.style.fontFamily = "opensans-bold";
            that.elem.style.marginBottom = "8px";
            that.elem.style.whiteSpace = "nowrap";

        };

        const initStatusLabel = function () {

            // Status Label
            lblStatus = Label({
                text: "No record selected",
                fontSize: 14,
                padding: [20, 6],
            });
            that.elem.style.color = "#999";
            that.elem.style.marginTop = "8px";

        }

        // Fill input fields from selected data
        const fillForm = function (data) {

            selectedId = data.id;
            inputId.setInputValue(String(data.id));
            inputName.setInputValue(data.name);
            inputEmail.setInputValue(data.email);
            inputActive.setInputValue(String(data.active));
            lblStatus.text = "Selected ID: " + data.id;
            btnEdit.enabled = 1;
            btnDelete.clickable = 1;
            btnDelete.opacity = 1;

        };

        // Clear input fields
        const clearForm = function () {

            selectedId = null;
            inputId.setInputValue("");
            inputName.setInputValue("");
            inputEmail.setInputValue("");
            inputActive.setInputValue("");
            lblStatus.text = "No record selected";
            btnEdit.enabled = 0;
            btnDelete.clickable = 0;
            btnDelete.opacity = 0.6;

        };

        const initEditForm = function () {

            const inputStyle = {
                width: "100%",
                height: "auto",
                leftPadding: 20,
                rightPadding: 20,
                createDescription: 0,
                backgroundColor: "#F6F6F6",
                selectedBackgroundColor: "#FFFFFF",
                lineColor: "transparent",
                selectedLineColor: "#65A293",
                createLeftBox: 0,
                createRightBox: 0,
                createUnit: 0,
                inputValue: "",
                maxChar: 100,
            };

            // ID (read-only)
            inputId = InputB({
                key: "id",
                ...inputStyle,
                titleText: "ID",
                placeholder: "Auto",
            });
            // Read-only
            inputId.input.enabled = 0;

            // Name
            inputName = InputB({
                key: "name",
                ...inputStyle,
                titleText: "NAME",
                placeholder: "Enter name",
            });

            // Email
            inputEmail = EmailInputB({
                key: "email",
                ...inputStyle,
                isRequired: 0,
                titleText: "EMAIL",
                placeholder: "Enter email",
                warningText: "Invalid email format",
                warningColor: "#E5885E", // "#F1BF3C"
            });

            // Active
            inputActive = NumberInputB({
                key: "active",
                ...inputStyle,
                titleText: "ACTIVE",
                placeholder: "1 or 0",
                maxChar: 1,
                allowNegative: 0,
                allowDecimal: 0,
            });

            // 0 or whatever enter just write 1
            inputActive.onEdit = function () {

                const value = inputActive.getInputValue();
                if (!(value == 1 || value == 0)) inputActive.setInputValue("1");
                
            }

        };

        const initFormButtons = function () {

            const buttonStyle = {
                width: "auto",
                padding: [12, 0],
                color: "#A8CFB1",
                fontSize: 16,
                minimal: 1,
                border: 0,
                round: 8,
            };

            // Buttons Group
            HGroup({
                fit: 1,
                gap: 8,
                padding: [20, 8],
                align: "left center",
            });

            // Edit Button
            btnEdit = Button({
                text: "Update Record",
                enabled: 0,
                ...buttonStyle,
            });
            that.elem.style.whiteSpace = "nowrap";
            that.on("click", function () {
                if (selectedId === null) return;

                const index = itemDataList.findIndex(function (item) {
                    return item.id === selectedId;
                });

                if (index !== -1) {
                    itemDataList[index].name = inputName.getInputValue();
                    itemDataList[index].email = inputEmail.getInputValue();
                    itemDataList[index].active = parseInt(inputActive.getInputValue()) || 0;
                    smartTable1.setItemDataList(itemDataList);
                    lblStatus.text = "Updated ID: " + selectedId;
                }
            });

            // Delete Button (Hold to Confirm)
            const _assetsPath = "../comp-m3/hold-to-confirm-button/";
            btnDelete = HoldToConfirmButton({
                width: "auto",
                labelText: "Hold to Delete",
                completedText: "DELETED",
                iconFile: _assetsPath + "trash.png",
                holdingIconFile: _assetsPath + "trash-red.png",
                style: {
                    layout: { gap: 4, padding: buttonStyle.padding, },
                    icon: { width: 24, height: 24, },
                    label: { fontSize: buttonStyle.fontSize, textColor: Black(0.65), },
                    box: { color: buttonStyle.color, border: buttonStyle.border, borderColor: Black(0.3), round: buttonStyle.round, },
                    holdingBox: { color: "#FFD1CB", },
                    holdingLabel: { fontSize: buttonStyle.fontSize, },
                }
            });
            btnDelete.clickable = 0;
            btnDelete.opacity = 0.6;

            btnDelete.onConfirm = function (self) {
                if (selectedId === null) return;

                const index = itemDataList.findIndex(function (item) {
                    return item.id === selectedId;
                });

                if (index !== -1) {
                    itemDataList.splice(index, 1);
                    smartTable1.setItemDataList(itemDataList);
                    lblStatus.text = "Deleted ID: " + selectedId;
                    clearForm();
                }
            };

            // Clear Form Button
            btnClean = Button({
                text: "Clear Form",
                width: "auto",
                ...buttonStyle,
            });
            that.elem.style.whiteSpace = "nowrap";
            that.on("click", function () {
                clearForm();
            });

            endGroup();

            Button({
                text: "Add New",
                width: "auto",
                height: "auto",
                color: "#65A293",
                padding: [6, 2],
                fontSize: 16,
                position: "absolute",
                right: 20,
                top: 10,
            });
            that.on("click", function () {

                let data = { id: newId, name: "User " + newId, desc: "desc", email: "user" + newId + "a@test.com", active: 0 };
                itemDataList.push(data);
                newId++;
                smartTable1.setItemDataList(itemDataList);
                fillForm(data);

            });

        };

        const findNextAvailableID = function () {

            if (itemDataList.length === 0) return 1;

            let maxId = 0;
            for (let i = 0; i < itemDataList.length; i++) {
                if (itemDataList[i].id > maxId) maxId = itemDataList[i].id;
            }

            return maxId + 1;

        };

    </script>
</head>

<body></body>

</html>
