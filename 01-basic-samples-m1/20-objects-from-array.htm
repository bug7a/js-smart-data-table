        <!-- ALL COMPONENTS IN ONE FILE -->

        <script>

        const ITEM_TEXT_LIST = ["Label1", "Label2", "Label3"];

        // First running function.
        window.onload = function() {

            // GROUP: Labels
            HGroup({
                align: "right center",
                gap: 4,
                padding: 20,
            });

                ITEM_TEXT_LIST.forEach(itemText => {

                    Label({
                        text: itemText,
                        color: "lightgray",
                        round: 6,
                        padding: [12, 6],
                    });

                });

            endGroup(); // END Labels

        };

        </script>
