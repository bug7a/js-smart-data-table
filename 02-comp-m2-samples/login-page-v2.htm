<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Login</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <!-- LIBRARY FILES -->
        <link rel="preload" href="../basic/font/open-sans/OpenSans-Regular.ttf" as="font" crossorigin="anonymous">
        <link rel="preload" href="../basic/font/open-sans/OpenSans-Bold.ttf" as="font" crossorigin="anonymous">
        <link rel="stylesheet" type="text/css" href="../basic/basic.min.css">
        <script src="../basic/basic.min.js" charset="utf-8" ></script>
        <script src="../basic/scroll-bar.min.js" charset="utf-8" ></script>

        <script src="../comp-m2/ui-effects.js" type="text/javascript" charset="utf-8"></script>
        <script src="../comp-m2/tooltip.min.js" charset="utf-8" ></script>
        <script src="../comp-m2/input-b.min.js" charset="utf-8" ></script>
        <script src="../comp-m2/email-input-b.min.js" charset="utf-8" ></script>
        <script src="../comp-m2/password-input-b.min.js" charset="utf-8" ></script>
        <script src="../comp-m2/waiting.min.js" charset="utf-8" ></script>
        <script src="../comp-m2/text-tabs.min.js" type="text/javascript" charset="utf-8" ></script>
        <script src="../comp-m2/login-page-v2.js" type="text/javascript" charset="utf-8" ></script>

        <script>

        const googleLogo = "https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg";
        const appleLogo = "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSRsP-EH-Fc-gjQMFgxj4g1pkFGVCK8Y2deHA&s";
    
        let loginPage = null;
        let userData = null;

        // First running function.
        window.onload = function() {

            page.color = "white";

            checkIfLoggedIn({
                onSuccess: initPageView,
                onFail: initLoginView,
            });

        };

        const fillTestData = function() {

            // TEST DATA: Fill the user data
            loginPage.loginEmail.setInputValue("bugra.ozden@gmail.com");
            loginPage.loginPassword.setInputValue("123456");
            // Call manuel to check form with out edit
            loginPage.loginEmail.onEdit();

        };

        const initLoginView = function() {
                
            // Show Login Page
            loginPage = LoginPage({
                panelWidth: 420,
                primaryColor: "#2C5A38",
                panelName: "MY PANEL v25.08.11",
                onLoginClick: onLoginClick,
                onSignupClick: onSignupClick,
                showPasswordIconFile: "../comp-m2/password-input-b/show-btn.png",
                hidePasswordIconFile: "../comp-m2/password-input-b/hide-btn.png",
                waitingIcon: "../comp-m2/waiting/clock3.png",
                signupPasswordParams: {
                    minChar: 8,
                    minCharWarningText: "Password must be at least 8 characters",
                    mustUseNumber: 1,
                    mustUseLetter: 1,
                    mustUseUppercase: 0,
                    mustUseLowercase: 0,
                    mustUseSpecialChar: 0,
                },
                ...LoginPageLightStyle,
            });

            // Add custom login buttons:
            loginPage.createButtonWithIcon("Sign in with Google", googleLogo, onLoginWithGoogle);
            loginPage.createButtonWithIcon("Sign in with Apple", appleLogo, onLoginWithApple);

            // TEST
            fillTestData();

        };

        const initPageView = function() {

            if (!userData) { logout(); return 0; }

            // or go to your page

            page.color = "whitesmoke";

            HGroup({
                    gap: 20,
                });

                Label({
                    text: "Logged In.",
                });

                Label({
                    text: "Logout",
                    color: "indianred",
                    textColor: "white",
                    padding: [8, 2],
                    round: 4,
                });
                that.elem.style.cursor = "pointer";
                that.on("click", function() {

                    logout();

                });

            endGroup();

        };

        const openPageByKey = function(key) {

            if (!userData) { logout(); return 0; }

            switch (key) {

                case "page1":
                    // open page 1
                    break;

                case "page2":
                    // open page 2
                    break;

            }

        };

        const checkIfLoggedIn = function(callback) {

            // callback: { onSuccess: func, onFail: func }

            // TODO: Check logged in with your service

            // TEST LOGIN:
            userData = basic.storage.load("appid_login");

            if (userData) {
                callback.onSuccess();
            } else {
                callback.onFail();
            }

        };

        const logout = function() {

            // TEST LOGIN:
            userData = null;
            basic.storage.save("appid_login", userData);

            // Try to logout with your service
            window.location.reload();

        };

        // Actions
        const onLoginClick = function() {

            loginPage.showAlert("login");

            const email = loginPage.loginEmail.getInputValue();
            const password = loginPage.loginPassword.getInputValue();

            if (!email || !password) { loginPage.showAlert("Please enter email and password"); return; }

            const onSuccess = function() {

                window.location.reload();

            };

            const onFail = function(message) {
                loginPage.showAlert("Login failed: " + message);
            };

            loginPage.waiting.show();

            try {
                
                // TEST LOGIN:
                userData = { user: "test" };
                basic.storage.save("appid_login", userData);

                // TODO: Try to login with your service
                onSuccess();
                //onFail();


            } catch (e) {
                loginPage.showAlert("Login error");

            } finally {
                loginPage.waiting.hide();
            }

        };

        const onSignupClick = function() {

            const email = loginPage.signupEmail.getInputValue();
            const p1 = loginPage.signupPassword.getInputValue();
            const p2 = loginPage.signupPassword2.getInputValue();

            if (!email || !p1 || !p2) { loginPage.showAlert("Please fill all fields"); return; }
            if (p1 !== p2) { loginPage.showAlert("Passwords do not match"); return; }

            const onSuccess = function() {

                loginPage.showAlert("Sign up successful. Check your email to confirm.", "#5DB182");
                loginPage.signupPassword.setInputValue("");
                loginPage.signupPassword2.setInputValue("");
                loginPage.loginEmail.setInputValue(loginPage.signupEmail.getInputValue());
                loginPage.setActiveTab(0);
                loginPage.tabBar.selectByIndex(0);

            };

            const onFail = function(message) {
                loginPage.showAlert("Sign up failed: " + message);
            };

            loginPage.waiting.show();

            try {
                
                // TODO: Try to Signup with your service
                onSuccess();
                //onFail();
                
            } catch (e) {
                loginPage.showAlert("Sign up error");

            } finally {
                loginPage.waiting.hide();
            }

        };

        const onLoginWithGoogle = function() {

            // TODO: Login with Google
            loginPage.showAlert("Logged in with Google.", "#5DB182");

        };

        const onLoginWithApple = function() {

            // TODO: Login with Apple
            loginPage.showAlert("Logged in with Apple.", "#5DB182");

        };

        </script>
        
    </head>
    <body></body>
</html>
