        <script>

        // COPY-PASTE EXAMPLE CODE FROM HANDBOOK AND TEST IT, MODIFY IT.
        
        // VARIABLES
        let lblText;
        let clickedCount = 0;
            
        // First running function.
        window.onload = function() {

            page.color = "whitesmoke";
        
            // GROUP: AutoLayout
            HGroup({
                // align: "center", // "top left", "center right"
                // gap: 0,
                // padding: 0, // [20, 4], [0, 0, 0, 0]
                // flow: "horizontal", // "vertical"
            });

                // LABEL: Clickable label
                lblText = Label({
                    text: "Click Me",
                    color: "white",
                    padding: [12, 4],
                    round: 4,
                    border: 1,
                    borderColor: "rgba(0, 0, 0, 0.1)",
                });
                that.elem.style.cursor = "pointer";
                that.on("click", increaseOne);

            endGroup();

        };
        
        const increaseOne = function() {

            clickedCount++;
            lblText.text = "Clicked Count: " + clickedCount;

            println(clickedCount);

        };

        </script>
